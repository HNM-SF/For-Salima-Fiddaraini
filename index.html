<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Love Salima 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <div class="overlay">

        <img src="assets/icons/icon 2.png" class="flower">

        <h1>My Love,<br>Salima Fiddaraini 🤍</h1>

        <p>A special birthday gift made with love.</p>

        <button id="openBtn">
            🌻 Buka Pesan
        </button>

    </div>

</section>

<section id="content" class="hidden">

    <div class="photo-card">

        <img src="assets/photos/foto-kita.jpeg">

    </div>

    <div class="letter">

        <h2>Untuk Salima 🌻</h2>

        <div id="typed-text"></div>

    </div>

</section>

<audio id="bgMusic" loop>
    <source src="assets/music/piano.mp3" type="audio/mpeg">
</audio>

<section id="closing" class="hidden">

    <div class="closing-card">

        <img src="assets/icons/icon 2.png" class="closing-flower">

        <h1>
            Happy 21st Birthday
        </h1>

        <h2>
            My Love,
            Salima Fiddaraini 🤍
        </h2>

        <p class="closing-quote">
            "SF adalah Sunflower.
            Dan kamu adalah wujud dari kehangatan itu."
        </p>

        <div class="signature">
            🌻✨<br>
            Made with Love<br>
            By Hidayat Nur Mustafidl
        </div>

    </div>

</section>

<audio id="bgMusic" loop>
    <source src="assets/music/piano.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
